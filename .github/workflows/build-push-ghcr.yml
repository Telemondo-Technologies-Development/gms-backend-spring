name: Build and push backend image to GHCR

on:
  push:
    branches:
      - dev
      - main
      - "*-feat-*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gms-backend-spring" >> $GITHUB_ENV

      - name: Compute tags
        run: |
          TAGS="${IMAGE}:${GITHUB_SHA}"
          TAGS="$TAGS,${IMAGE}:${GITHUB_REF_NAME}"
          echo "TAGS=$TAGS" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.TAGS }}
