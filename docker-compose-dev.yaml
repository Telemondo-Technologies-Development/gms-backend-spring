services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: ./.env
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_ROOT_PASSWORD: "${DB_PASS}"
    ports:
      - "${DB_PORT}:3306"
    networks:
      - mysql
    volumes:
      - db:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    environment:
      PMA_ARBITRARY: 1
      PMA_HOST: mysql
      PMA_PORT: 3306
    volumes:
      - ./php-make/upload.ini:/usr/local/etc/php/php.ini
    depends_on:
      - mysql
    links:
      - mysql
    networks:
      - mysql
    ports:
      - "${PHPMYADMIN_PORT}:80"

  nats:
    image: nats:2.12.0
    restart: unless-stopped
    ports:
      - "${NATS_LOCAL_PORT}:${NATS_DOCKER_PORT}"
      - "${NATS_MONITOR_LOCAL_PORT}:${NATS_MONITOR_DOCKER_PORT}"
    networks:
      - mysql

  minio:
    image: minio/minio
    container_name: minio_server
    ports:
      - "${MINIO_API_PORT}:9000"    # API port
      - "${MINIO_CONSOLE_PORT}:9001" # Console UI port
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
    command: server /data --console-address ":9001"
    networks:
      - mysql
    volumes:
      - minio_data:/data

  backend:
    image: ghcr.io/telemondo-technologies-development/gms-backend-spring:dev

    restart: unless-stopped
    env_file: ./.env
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_CONTAINER_PORT}"
      MINIO_URL: "http://minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ROOT_USER}"
      MINIO_SECRET_KEY: "${MINIO_ROOT_PASSWORD}"

      SPRING_PROFILES_ACTIVE: dev

      NATS_URL: "nats://nats:${NATS_DOCKER_PORT}"

    depends_on:
      - mysql
      - nats
    networks:
      - mysql
    ports:
      - "${BACKEND_PORT}:8080"

networks:
  mysql:
    name: mysql
    driver: bridge

volumes:
  db:
  minio_data: